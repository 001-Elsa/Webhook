server:
  port: 8080

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"

spring:
  application:
    name: notification-platform
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/event_relay?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:eventrelay}
    password: ${MYSQL_PASSWORD:eventrelay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:eventrelay}
    password: ${RABBITMQ_PASSWORD:eventrelay}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 20
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

webhook:
  dispatcher:
    fixed-delay-ms: 5000
  http:
    connect-timeout-ms: ${WEBHOOK_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${WEBHOOK_READ_TIMEOUT_MS:5000}
  queue:
    recovery-batch-size: 100
  retention:
    delivery-attempt-days: ${DELIVERY_ATTEMPT_RETENTION_DAYS:30}
    cleanup-cron: "0 30 3 * * *"

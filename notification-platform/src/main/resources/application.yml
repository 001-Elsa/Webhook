server:
  port: 8080

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"

spring:
  application:
    name: notification-platform
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/event_relay?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:eventrelay}
    password: ${MYSQL_PASSWORD:eventrelay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:eventrelay}
    password: ${RABBITMQ_PASSWORD:eventrelay}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

webhook:
  dispatcher:
    fixed-delay-ms: 5000
  queue:
    recovery-batch-size: 100

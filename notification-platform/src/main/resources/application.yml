server:
  port: 8080

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"

spring:
  application:
    name: notification-platform
  datasource:
    url: jdbc:h2:file:./data/notification-platform;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

webhook:
  dispatcher:
    fixed-delay-ms: 2000

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Order Demo</title>
  <style>
    body { margin: 0; font-family: Inter, "Microsoft YaHei", Arial, sans-serif; background: #f7f8fa; color: #1f2937; }
    header { background: #0f172a; color: white; padding: 18px 28px; }
    main { padding: 22px 28px; max-width: 920px; margin: 0 auto; }
    section { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    h1 { margin: 0; font-size: 22px; }
    h2 { margin: 0 0 12px; font-size: 16px; }
    input { padding: 9px; border: 1px solid #d1d5db; border-radius: 6px; }
    button { border: 0; border-radius: 6px; background: #2563eb; color: white; padding: 8px 12px; cursor: pointer; margin-right: 6px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid #edf0f3; padding: 9px; text-align: left; }
  </style>
</head>
<body>
<header><h1>Mini Order Demo</h1></header>
<main>
  <section>
    <h2>创建订单</h2>
    <input id="amount" value="99.9">
    <button onclick="createOrder()">创建并发布 order.created</button>
  </section>
  <section>
    <h2>订单</h2>
    <table>
      <thead><tr><th>订单号</th><th>金额</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="orders"></tbody>
    </table>
  </section>
</main>
<script>
const json = r => r.json();
async function refresh() {
  const orders = await fetch('/api/orders').then(json);
  document.querySelector('#orders').innerHTML = orders.map(o => `<tr>
    <td>${o.orderId}</td><td>${o.amount}</td><td>${o.status}</td><td>
    <button onclick="action('${o.orderId}', 'pay')">支付</button>
    <button onclick="action('${o.orderId}', 'ship')">发货</button>
    <button onclick="action('${o.orderId}', 'cancel')">取消</button></td></tr>`).join('');
}
async function createOrder() {
  await fetch('/api/orders', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({amount: Number(document.querySelector('#amount').value)}) });
  refresh();
}
async function action(orderId, name) {
  await fetch(`/api/orders/${orderId}/${name}`, { method: 'POST' });
  refresh();
}
refresh();
</script>
</body>
</html>
